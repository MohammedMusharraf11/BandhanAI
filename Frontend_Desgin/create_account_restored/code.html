<!DOCTYPE html>

<html class="dark" lang="en"><head>

            -webkit-text-fill-color: #e5e2e3;

            transition: background-color 5000s ease-in-out 0s;
        }

                      "secondary-container": "#474649",
                      "background": "#0A0A0B",
                      "on-surface-variant": "#d7c3ae",
                      "surface-container-high": "#2a2a2b",
                      "tertiary-fixed-dim": "#7cd0ff",
                      "surface-tint": "#ffb955",
                      "inverse-on-surface": "#313031",
                      "tertiary": "#9bd9ff",
                      "surface-variant": "#353436",
                      "surface-bright": "#3a393a",
                      "on-primary-fixed-variant": "#633f00",
                      "tertiary-fixed": "#c4e7ff",

<body class="flex flex-col min-h-screen items-center justify-center p-gutter">
<!-- Background Atmospheric Effect -->
<div class="fixed inset-0 overflow-hidden pointer-events-none -z-10">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/5 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[30%] h-[30%] bg-primary/5 blur-[100px] rounded-full"></div>
</div>
<main class="w-full max-w-[440px] flex flex-col items-center">
<!-- Logo Section -->
<div class="flex flex-col items-center mb-stack-lg animate-in fade-in slide-in-from-bottom-4 duration-700">
<div class="w-12 h-12 bg-primary flex items-center justify-center mb-stack-md rounded-lg shadow-[0_0_20px_rgba(245,166,35,0.2)]">
<span class="material-symbols-outlined text-background font-bold" style="font-variation-settings: 'wght' 700;">hub</span>
</div>
<h1 class="font-display-lg text-display-lg text-on-background tracking-tight">BandhanAI</h1>
<p class="font-body-base text-on-surface-variant text-center mt-unit">AI-powered CRM for modern commerce</p>
</div>
<!-- Registration Card -->
<div class="w-full bg-surface-container-low premium-border p-stack-lg rounded-lg shadow-2xl animate-in fade-in slide-in-from-bottom-8 duration-1000 delay-100">
<!-- Social Signup -->
<button class="w-full flex items-center justify-center gap-stack-md py-stack-md bg-transparent premium-border hover:bg-surface-container-high transition-all duration-200 group active:scale-[0.98] mb-stack-lg">
<svg fill="none" height="20" viewbox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="font-body-base font-medium text-on-surface">Continue with Google</span>
</button>
<div class="relative flex items-center mb-stack-lg">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="px-stack-md font-label-caps text-on-surface-variant uppercase bg-surface-container-low">OR</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<!-- Registration Form -->
<form class="space-y-stack-md" onsubmit="return false">
<div class="space-y-unit">
<label class="font-label-caps text-on-surface-variant uppercase ml-unit" for="name">Full Name</label>
<div class="premium-border bg-[#09090B] flex items-center px-stack-md py-stack-sm transition-colors focus-within:ring-1 focus-within:ring-primary/20">
<span class="material-symbols-outlined text-on-surface-variant mr-stack-md text-body-base">person</span>
<input class="bg-transparent border-none focus:ring-0 w-full text-on-background font-body-base placeholder:text-on-secondary-fixed-variant" id="name" placeholder="Elias Thorne" type="text"/>
</div>
</div>
<div class="space-y-unit">
<label class="font-label-caps text-on-surface-variant uppercase ml-unit" for="email">Work Email</label>
<div class="premium-border bg-[#09090B] flex items-center px-stack-md py-stack-sm transition-colors focus-within:ring-1 focus-within:ring-primary/20">
<span class="material-symbols-outlined text-on-surface-variant mr-stack-md text-body-base">mail</span>
<input class="bg-transparent border-none focus:ring-0 w-full text-on-background font-body-base placeholder:text-on-secondary-fixed-variant" id="email" placeholder="elias@company.ai" type="email"/>
</div>
</div>
<div class="space-y-unit">
<label class="font-label-caps text-on-surface-variant uppercase ml-unit" for="password">Password</label>
<div class="premium-border bg-[#09090B] flex items-center px-stack-md py-stack-sm transition-colors focus-within:ring-1 focus-within:ring-primary/20">
<span class="material-symbols-outlined text-on-surface-variant mr-stack-md text-body-base">lock</span>
<input class="bg-transparent border-none focus:ring-0 w-full text-on-background font-body-base placeholder:text-on-secondary-fixed-variant" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="pt-stack-md">
<button class="w-full bg-primary py-stack-md font-body-base font-bold text-background transition-all hover:bg-[#E8A020] active:scale-[0.97] flex items-center justify-center gap-unit group" type="submit">
                        Create Account
                        <span class="material-symbols-outlined text-body-base group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
</form>
<!-- Terms -->
<p class="mt-stack-lg text-center font-body-sm text-on-secondary-fixed-variant leading-relaxed">
                By clicking "Create Account", you agree to our <a class="text-on-surface-variant hover:text-primary underline-offset-4 underline decoration-outline-variant transition-colors" href="#">Terms of Service</a> and <a class="text-on-surface-variant hover:text-primary underline-offset-4 underline decoration-outline-variant transition-colors" href="#">Privacy Policy</a>.
            </p>
</div>
<!-- Footer Link -->
<div class="mt-stack-lg animate-in fade-in slide-in-from-bottom-2 duration-1000 delay-300">
<p class="font-body-base text-on-surface-variant">
                Already have an account? 
                <a class="text-primary font-bold ml-unit hover:text-[#E8A020] transition-colors focus:underline outline-none" href="#">Sign in</a>
</p>
</div>
</main>
<!-- Micro-interaction Script -->
<script>
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('border-primary');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('border-primary');
            });
        });

        // Simple button active state simulation
        const submitBtn = document.querySelector('button[type="submit"]');
        submitBtn.addEventListener('click', () => {
            submitBtn.innerHTML = `
                <div class="flex items-center gap-stack-md">
                    <svg class="animate-spin h-5 w-5 text-background" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <span>Configuring Workspace...</span>
                </div>
            `;
            setTimeout(() => {
                submitBtn.innerHTML = `Create Account <span class="material-symbols-outlined text-body-base group-hover:translate-x-1 transition-transform">arrow_forward</span>`;
            }, 2000);
        });
    </script>
</body></html>
