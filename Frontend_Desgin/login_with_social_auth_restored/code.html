</div>
</div>

</div>
<div class="relative group">
<input class="w-full bg-surface-container-lowest border border-outline px-stack-md py-3 font-body-base text-on-background focus:border-primary transition-all duration-200" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>

</button>
</form>

<a class="font-data-mono text-data-mono text-on-surface-variant/40 hover:text-on-surface-variant transition-colors" href="#">Terms</a>

<script>
        // Simple micro-interaction for button feedback
        const loginBtn = document.querySelector('button[type="submit"]');
        loginBtn.addEventListener('click', () => {
            const originalContent = loginBtn.innerHTML;
            loginBtn.innerHTML = `
                <span class="flex items-center gap-2">
                    <svg class="animate-spin h-5 w-5 text-on-primary" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    Authenticating...
                </span>
            `;
            setTimeout(() => {
                loginBtn.innerHTML = originalContent;
            }, 2000);
        });
    </script>
